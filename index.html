<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <meta name="theme-color" content="#050812" />

  <title>Kozmik Rota: Solar Mission</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050812;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #game-container {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    #rotate-warning {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: #050812;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 22px;
      line-height: 1.5;
      text-align: center;
    }

    @media screen and (orientation: portrait) and (max-width: 900px) {
      #rotate-warning {
        display: flex;
      }

      #game-container {
        visibility: hidden;
      }
    }
  </style>
</head>

<body>
  <div id="game-container"></div>

  <div id="rotate-warning">
    Göreve başlamak için cihazını yatay çevir.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
